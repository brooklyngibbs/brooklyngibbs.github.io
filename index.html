<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn Gibbs - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-wrapper">
            <a href="#" class="logo">Brooklyn Gibbs</a>
            <nav>
                <a href="#home">Home</a>
                <a href="#work">Work</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="content">
            <h1>brooklyn gibbs</h1>
            <p class="bio">exploring the intersection of music, tech, and memory</p>
        </div>

        <div class="project-grid">
            <a href="pages/aurify.html" class="project-link" title="aurify">
                <img src="images/recordplayer.svg" alt="Record Player Project">
            </a>
            <a href="pages/audio_research.html" class="project-link" title="audio_research">
                <img src="images/record.svg" alt="Vinyl Record Project">
            </a>
            <a href="pages/substack.html" class="project-link" title="substack">
                <img src="images/book.svg" alt="Book Project">
            </a>
            <a href="#music" class="project-link" title="music">
                <img src="images/heart.svg" alt="Heart Project">
            </a>
        </div>
    </main>
    <button id="scrollToTop" title="Go to top">↑</button>

    <script>
        // Get the button
        const scrollToTopBtn = document.getElementById("scrollToTop");

        // Show the button when scrolled down 100px
        window.addEventListener("scroll", () => {
            if (window.scrollY > 100) {
                scrollToTopBtn.classList.add("show");
            } else {
                scrollToTopBtn.classList.remove("show");
            }
        });

        // Scroll to top when button is clicked
        scrollToTopBtn.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    </script>

</body>
</html>
